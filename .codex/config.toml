model = "gpt-5.5"
model_provider = "openai"
personality = "pragmatic"
model_reasoning_effort = "high"
plan_mode_reasoning_effort = "high"
model_verbosity = "low"
approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "cached"
project_doc_max_bytes = 65536
project_doc_fallback_filenames = ["CLAUDE.md", ".agents.md"]

[projects."/Users/dan/projects/ruby_service_bucket"]
trust_level = "trusted"

[projects."/Users/dan/projects/grow"]
trust_level = "trusted"

[projects."/Users/dan/projects/themis"]
trust_level = "trusted"

[projects."/Users/dan"]
trust_level = "trusted"

[tui.model_availability_nux]
"gpt-5.5" = 4

[notice]
fast_default_opt_out = true

[agents]
max_threads = 6
max_depth = 1
job_max_runtime_seconds = 1800

[sandbox_workspace_write]
writable_roots = ["/Users/dan/.codex/memories"]
network_access = false

[features]
multi_agent = true
shell_snapshot = true
tool_search = true
image_generation = true
enable_request_compression = true
workspace_dependencies = true

[profiles.fast]
model = "gpt-5.4-mini"
model_reasoning_effort = "low"
model_verbosity = "low"

[profiles.deep]
model = "gpt-5.5"
model_reasoning_effort = "xhigh"
plan_mode_reasoning_effort = "xhigh"
model_verbosity = "medium"

[profiles.review]
model = "gpt-5.5"
review_model = "gpt-5.5"
model_reasoning_effort = "high"
model_verbosity = "low"

[mcp_servers.openaiDeveloperDocs]
url = "https://developers.openai.com/mcp"

[mcp_servers.github]
url = "https://api.githubcopilot.com/mcp/"
bearer_token_env_var = "GITHUB_PAT_TOKEN"

[mcp_servers.linear]
url = "https://mcp.linear.app/mcp"
